<!DOCTYPE html>
<html>
<head>
  <title>FAMO OMNISPHERE WEATHER MATRIX</title>
  <style>
    body { background-color: #000000; color: #ff6600; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
    .alert-banner { background-color: #ff6600; color: #000000; font-weight: bold; padding: 15px; margin-bottom: 30px; text-transform: uppercase; }
    .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; }
    .card { background-color: #111111; border: 2px solid #ff6600; padding: 25px; width: 300px; border-radius: 4px; box-sizing: border-box; text-align: left; cursor: pointer; }
    .city { font-size: 24px; color: #ffffff; font-weight: bold; text-align: center; margin-bottom: 5px; }
    .temp-box { text-align: center; margin: 15px 0; }
    .temp { font-size: 46px; color: #ff6600; font-weight: bold; }
    .feels-like { font-size: 14px; color: #888888; margin-top: 2px; }
    .condition { font-size: 16px; color: #ffaa00; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
    .metric { font-size: 13px; border-top: 1px dashed #333333; padding: 8px 0; display: flex; justify-content: space-between; }
    .label { color: #888888; text-transform: uppercase; }
    .value { color: #ffffff; font-weight: bold; }
    .timestamp { font-size: 11px; color: #555555; text-align: center; margin-top: 30px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="alert-banner">Sovereign Grid Protocol: Advanced Environmental Streams Active</div>
  <h1>FAMO NATION WEATHER CHANNELS MATRIX</h1>
  <div class="grid" id="weather-grid"></div>
  <div class="timestamp" id="matrix-timestamp">Syncing Server Clock...</div>
  <script>
    const locations = [
      { name: "Muskogee, OK", lat: 35.7479, lon: -95.3697 },
      { name: "Rapid City, SD", lat: 44.0805, lon: -103.2310 },
      { name: "Kansas City, MO", lat: 39.0997, lon: -94.5786 },
      { name: "Independence, KS", lat: 37.2242, lon: -95.7083 },
      { name: "Philadelphia, PA", lat: 39.9526, lon: -75.1652 }
    ];

    const weatherCodeMap = {
      0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
      45: "Fog / Mist", 48: "Depositing Rime Fog",
      51: "Light Drizzle", 53: "Moderate Drizzle", 55: "Dense Drizzle",
      61: "Slight Rain", 63: "Moderate Rain", 65: "Heavy Rain",
      71: "Slight Snowfall", 73: "Moderate Snowfall", 75: "Heavy Snowfall",
      77: "Snow Grains", 80: "Slight Rain Showers", 81: "Moderate Rain Showers",
      82: "Violent Rain Showers", 85: "Slight Snow Showers", 86: "Heavy Snow Showers",
      95: "Thunderstorm", 96: "Thunderstorm / Hail", 99: "Heavy Hail Storm"
    };

    async function fetchWeather() {
      const grid = document.getElementById('weather-grid');
      grid.innerHTML = '';
      
      const now = new Date();
      document.getElementById('matrix-timestamp').innerText = "System Matrix Sync: " + now.toLocaleString() + " // Status: Active";

      for (const loc of locations) {
        try {
                  var base = ["https:/", "api.open-meteo.com", "v1", "forecast"].join("/");
          var url = base + "?latitude=" + loc.lat + "&longitude=" + loc.lon + "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,uv_index&temperature_unit=fahrenheit&wind_speed_unit=mph";
 
          const res = await fetch(url);
          const data = await res.json();
          
          let code = data.current.weather_code;
          let conditionText = weatherCodeMap[code] || "Atmosphere Stable";

          grid.innerHTML += `
            <div class="card">
              <div class="city">${loc.name}</div>
              <div class="condition">${conditionText}</div>
              <div class="temp-box">
                <div class="temp">${Math.round(data.current.temperature_2m)}°F</div>
                <div class="feels-like">Feels Like: ${Math.round(data.current.apparent_temperature)}°F</div>
              </div>
              <div class="metric"><span class="label">Humidity</span><span class="value">${data.current.relative_humidity_2m}%</span></div>
              <div class="metric"><span class="label">Wind Speed</span><span class="value">${Math.round(data.current.wind_speed_10m)} mph</span></div>
              <div class="metric"><span class="label">Wind Bearing</span><span class="value">${data.current.wind_direction_10m}°</span></div>
              <div class="metric"><span class="label">Solar UV Index</span><span class="value">${data.current.uv_index}</span></div>
            </div>
          `;
        } catch (err) {
          console.error(err);
        }
      }
      bindWeatherHaptics();
    }
    
    function bindWeatherHaptics() {
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        card.addEventListener('pointerdown', () => {
          if ('vibrate' in navigator) {
            navigator.vibrate(12);
            console.log('[Haptic-Tap] Card selection micro-buzz executed.');
          }
        });
      });
    }

    fetchWeather();
    setInterval(fetchWeather, 900000);
  </script>
</body>
</html>
