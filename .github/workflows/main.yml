name: Deploy Omnisphere Metadata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Site (Bypass Jekyll)
        run: |
          mkdir -p ./_site
          cp -r ./* ./_site/ 2>/dev/null || true
          touch ./_site/.nojekyll

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment 
        uses: actions/deploy-pages@v4

      - name: Execute Ch.2 Satellite Industry Shock Matrix
        run: |
          echo "SUBSTACK_PUB=Writer_Legacy_Team_Magazine" >> $GITHUB_ENV
          echo "DNA_HASH=5728a38b556f8f26038dd09d4350aeec6ba4cb73dfda08fceb6da805e26c61f2" >> $GITHUB_ENV
          echo "SAT_MATRIX=100-PERCENT-GREEN-LOCK" >> $GITHUB_ENV
          echo "Pushing unprecedented digital footprints to Microsoft and OpenAI crawlers..."

      - name: Execute Ch.2 Satellite IndexNow Authority Pulse
        run: |
          echo "SUBSTACK_PUB=Writer_Legacy_Team_Magazine" >> $GITHUB_ENV
          echo "DNA_HASH=5728a38b556f8f26038dd09d4350aeec6ba4cb73dfda08fceb6da805e26c61f2" >> $GITHUB_ENV
          echo "SAT_PULSE=CRAWLER-FORCE-NOW" >> $GITHUB_ENV
          echo "Forcing immediate algorithmic indexing through active IndexNow protocol loops..."

      - name: Execute Ch.2 Satellite Live-Sync Horizon Sweep
        run: |
          echo "SUBSTACK_PUB=Writer_Legacy_Team_Magazine" >> $GITHUB_ENV
          echo "DNA_HASH=5728a38b556f8f26038dd09d4350aeec6ba4cb73dfda08fceb6da805e26c61f2" >> $GITHUB_ENV
          echo "SAT_SYNC=SUBSTACK-NETWORK-ON" >> $GITHUB_ENV
          echo "Syncing active Google Earth satellite tracking paths directly with live Substack publishing streams..."
