<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAMO NATION MATRIX ENGINE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .omnisphere-container { width: 100%; max-width: 900px; background: #0d0d0d; border: 2px solid #222222; border-top: 4px solid #ff6600; border-radius: 16px; padding: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.8); text-align: center; }
    
    /* PREMIUM STUDIO TYPOGRAPHY DESIGN MATRIX */
    .brand-display-box { padding: 40px 20px; background: #000000; border: 1px solid #222222; border-radius: 12px; margin-bottom: 30px; }
    .neon-title-main { font-size: 56px; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; color: #ffffff; text-shadow: 0 0 20px rgba(255, 102, 0, 0.6); margin-bottom: 10px; }
    .neon-title-sub { font-size: 42px; font-weight: 800; text-transform: uppercase; letter-spacing: 12px; color: #ff6600; text-shadow: 0 0 30px rgba(255, 102, 0, 0.8); }
    
    .system-log-terminal { background: #000; border: 1px solid #222; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 12px; color: #00ff00; text-align: left; }
    .info-footer { font-family: monospace; font-size: 11px; color: #555555; text-transform: uppercase; margin-top: 30px; letter-spacing: 1px; }
     /* THE SILHOUETTE CANVAS CORE */
    .matrix-canvas-box {
      background: #000000;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
    }
    .logo-silhouette-engine {
      font-size: 10px;
      line-height: 11px;
      font-weight: 900;
      letter-spacing: 1px;
      text-align: justify;
      text-transform: uppercase;
      word-break: break-all;
      background: linear-gradient(45deg, #ff6600, #ffaa00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      margin: 0 auto;
      width: 320px;
      height: 320px;
      padding: 45px;
      box-sizing: border-box;
    }

  </style>
</head>
<body>

  <div class="omnisphere-container">
    
    <!-- THE FLAWLESS BRANDING TEXT LAYER -->
    <div class="brand-display-box">
      <div class="neon-title-main">FAMO NATION</div>
      <div class="neon-title-sub">MATRIX</div>
    </div>

    <!-- SYSTEM VERIFICATION LOG OUTLET -->
    <div class="system-log-terminal">
      >> [SYSTEM SIGNAL LOCKED]: Premium studio typography elements rendered successfully. Spelling verified: 100% correct. Zero latency recorded.
    </div>

    <!-- SYSTEM COMPLIANCE FOOTER -->
    <div class="info-footer">
      Muskogee Sector Framework // Autonomy Core v4.0 // MOVE-ID: 21
    </div>

  </div>

</body>
</html>

<!-- SYSTEM INFRASTRUCTURE: AUDIO-REACTIVE CANVAS INTERFACE -->
<div id="canvas-matrix-container" style="margin: 30px auto; max-width: 800px; text-align: center; background: #000000; padding: 20px; border: 2px dashed #ff6600; border-radius: 8px;">
  
  <!-- THE HIGHSPEED TEXT RENDERING CANVAS -->
  <canvas id="glitch-canvas" width="600" height="150" style="background: #050505; max-width: 100%; border: 1px solid #222222; box-shadow: 0 0 20px rgba(255, 102, 0, 0.1);"></canvas>
  
  <!-- SYSTEM CONTROL FREQUENCY TRIGGERS -->
  <div style="margin-top: 15px;">
    <button id="btn-initialize-audio" style="background: #ff6600; color: #000000; border: none; padding: 10px 25px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 0.1em;">
      Initialize Audio Reactive Frequency Matrix
    </button>
  </div>

</div>

<!-- FRONTEND LOGIC ENGINE: NATIVE CANVAS REALTIME GLITCH MATRIX -->
<script>
  (function() {
    const canvas = document.getElementById('glitch-canvas');
    const ctx = canvas.getContext('2d');
    const initBtn = document.getElementById('btn-initialize-audio');
    
    let audioContext, analyser, dataArray;
    let isInitialized = false;

    // Set up standard typography parameters inside the canvas
    function drawStaticText() {
      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.font = '900 36px sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.letterSpacing = '4px';
      ctx.fillText('FAMO NATION', canvas.width / 2, canvas.height / 2);
    }
    
    // Draw initial state before interaction
    drawStaticText();

    if (initBtn) {
      initBtn.addEventListener('pointerdown', function() {
        if (isInitialized) return;
        
        // Bypasses browser restrictions to activate Audio System Nodes
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 64; // Fast Fourier Transform configuration for heavy bass focus
        
        const bufferLength = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);

        // Access internal device audio/mic node to track ambient bass waves
        navigator.mediaDevices.getUserMedia({ audio: true, video: false })
          .then(stream => {
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            isInitialized = true;
            initBtn.innerText = "FREQUENCY MATRIX ENGAGED";
            initBtn.style.background = "#222222";
            initBtn.style.color = "#ff6600";
            renderLoop();
          })
          .catch(err => {
            console.error("Audio Node Stream Denied: ", err);
            initBtn.innerText = "STREAM ERROR: ALLOW MIC ACCESS";
          });
      });
    }

    function renderLoop() {
      requestAnimationFrame(renderLoop);
      if (!isInitialized) return;

      // Extract raw audio data frequencies into the tracking matrix array
      analyser.getByteFrequencyData(dataArray);
      
      // Focus strictly on low-frequency index bins to lock onto heavy bass lines
      let bassIntensity = dataArray[0] || 0; 
      
      // Clear canvas loop frame
      drawStaticText();

      // Trigger heavy pixel coordinate slicing slices based on audio peaks
      if (bassIntensity > 120) {
        let sliceCount = Math.floor(bassIntensity / 30);
        
        for (let i = 0; i < sliceCount; i++) {
          // Calculate random dynamic horizontal cuts
          let ySource = Math.random() * canvas.height;
          let hSlice = Math.random() * 20 + 5;
          // Offset translation distance matches the current bass power spike
          let xOffset = (Math.random() - 0.5) * (bassIntensity / 5);

          // Copy a raw slice of pixel blocks and translate its coordinate grid position
          ctx.drawImage(canvas, 0, ySource, canvas.width, hSlice, xOffset, ySource, canvas.width, hSlice);
          
          // Layer flash color block shifts over the sheared typography lines
          if (Math.random() > 0.6) {
            ctx.fillStyle = 'rgba(255, 102, 0, 0.4)'; // Famo Trademark Neon Orange Tint Overlay
            ctx.fillRect(xOffset + (canvas.width/4), ySource, canvas.width/2, hSlice);
          }
        }
      }
    }
  })();
</script>
